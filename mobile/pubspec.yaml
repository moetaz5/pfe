name: appmobile
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.2.1
  cookie_jar: ^4.0.9
  dio_cookie_manager: ^3.0.0
  path_provider: ^2.0.15
  shared_preferences: ^2.2.0
  url_launcher: ^6.3.0
  universal_io: ^2.2.2
  flutter_svg: ^2.2.4
  intl: ^0.19.0
  file_picker: ^8.0.0
  fl_chart: ^0.71.0
  app_links: ^6.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
